name: Test frontend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint and test mowecl_react
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd mowecl_react
          pnpm install
      - name: Lint
        run: |
          cd mowecl_react
          pnpm lint
      - name: Test
        run: |
          cd mowecl_react
          pnpm test
      - name: Build
        run: |
          cd mowecl_react
          pnpm build
